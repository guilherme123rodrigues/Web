<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Cadastro</title>

        <link rel="stylesheet" href="./cadastro.css">
    </head>
    <body>

        <header>
            <h1>&copy; Sistema atualizado na versão Beta</h1>
        </header>

        <main>
            <div class="cad">
                <form>
                    <fieldset>
                        <legend>Dados Pessoais</legend>
                        <label for="nome">Nome:</label>
                        <input id="nome" type="text" name="nome" required>

                        <label for="idade">Idade:</label>
                        <input id="idade" type="number" name="idade" required class="idade">

                        <label for="telefone">Telefone:</label>
                        <input id="telefone" type="tel" name="telefone" required placeholder="(xx) xxxxx-xxxx" class="tel">

                        <label for="data-nascimento">Data de nascimento:</label>
                        <input id="data-nascimento" type="date" name="data de nascimento" required class="date">

                        <div class="segunda-linha">
                            <label for="e-mail">E-mail:</label>
                            <input id="e-mail" type="email" name="e-mail" required placeholder="seue-mail@dominio.com">

                            <label for="senha">Senhas de 5 digitos:</label>
                            <input id="senha" type="password" name="senha" required class="senha">
                        </div>
                    </fieldset>

                    <fieldset  class="cursos">
                        <legend>Cursos</legend>
                        <select id="cursos">
                            <option>Graduação</option>
                            <option>Pós</option>
                            <option>Curso tecnico</option>
                            <option>Nenhum</option>
                        </select>
                    </fieldset>    
                    
                    <nav class="escola">
                        <fieldset id="escola">
                            <legend>Instituição de estudo</legend>
                            <textarea cols="30" rows="1"></textarea>
                        </fieldset>
                    </nav>

                    <nav class="esperiencia">
                        <fieldset>
                            <legend>Esperiencia proficial</legend>
                            <select id="esperiencia">
                                <option>Menos de 1 ano</option>
                                <option>1 a 2 anos</option>
                                <option>2 a 3 anos</option>
                                <option>3 a 4 anos</option>
                                <option>Mais de 4 anos</option>
                                <option>Não tenho esperiência</option>
                            </select>
                        </fieldset>
                    </nav>

                    <nav class="data-ini">
                        <fieldset>
                            <legend>inicio dos estudos</legend>
                            <label for="inicio"></label>
                            <input id="inicio" type="date" name="inicio-estudos" class="date-inicio" required>
                        </fieldset>
                    </nav>

                    <nav class="data-termi">
                        <fieldset>
                            <legend>Data de terminio</legend>
                            <label for="terminio"></label>
                            <input id="terminio" type="date" name="data-terminio" class="data-terminio" required>
                        </fieldset>
                    </nav>

                    <br>
                    <input type="submit" class="enviar">
                </form>
            </div>

        </main>

        <footer>
            <p>&copy; Criado em 2026</p>
        </footer>

    </body>
</html>
